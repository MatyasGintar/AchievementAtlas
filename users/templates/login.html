{% extends "layout.html" %}
{% load account %}

{% block content %}
<div class="auth-wrapper" style="max-width: 400px; margin: 50px auto; padding: 30px; background: #1b2838; border-radius: 8px; color: white;">
    <h2 style="margin-top: 0; color: #66c0f4;">Přihlášení</h2>
    
    <form class="login-form" method="POST" action="{% url 'account_login' %}">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
        {% endif %}
        
        <button class="btn" type="submit" style="width: 100%; padding: 10px; margin-top: 15px; background: #66c0f4; border: none; color: #1b2838; font-weight: bold; cursor: pointer; border-radius: 4px;">
            Přihlásit se
        </button>
    </form>
    
    <p style="margin-top: 20px; font-size: 0.9rem; text-align: center;">
        Nemáte ještě účet? <a href="{{ signup_url }}" style="color: #66c0f4;">Zaregistrujte se</a>.
    </p>
</div>
{% endblock %}
