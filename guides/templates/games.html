{% extends "layout.html" %}

{% block content %}
<div class="container">

    <h1 class="title">Achievement Guides</h1>

    <ul class="game-list">
        {% for game in games %}
            <li class="game-card">
                <a href="{% url 'game_detail' game.slug %}">
                    <img src="{{ game.cover_url }}" alt="{{ game.name }}" />
                    
                    <div class="game-info-overlay">
                        <h3>{{ game.name }}</h3>
                        
                        <div class="game-meta">
                            <span><i class="fas fa-trophy"></i> {{ game.total_achievements }}</span>
                            <span>• {{ game.release_year }}</span>
                        </div>

                        <div class="game-genres">
                            {% for genre in game.genres.all|slice:":3" %}
                                <span class="genre-badge">{{ genre.name }}</span>
                            {% endfor %}
                        </div>
                    </div>
                </a>
            </li>
        {% endfor %}
    </ul>

</div>
{% endblock %}
